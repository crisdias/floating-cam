name: build-release

# Gera o executável e publica numa Release quando você cria uma tag de versão
# (ex.: v1.0.0). Também pode ser disparado manualmente na aba Actions.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # necessário para criar a Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publicar (.exe único, autossuficiente)
        shell: pwsh
        run: >
          dotnet publish FloatingCam -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          -o publish

      - name: Enviar artefato (build de cada execução)
        uses: actions/upload-artifact@v4
        with:
          name: FloatingCam-win-x64
          path: publish/FloatingCam.exe

      - name: Publicar Release (somente em tags v*)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/FloatingCam.exe
          body: |
            **FloatingCam** — webcam flutuante para gravação de aulas.

            ### Como usar
            1. Baixe o `FloatingCam.exe` abaixo (Windows 64-bit).
            2. Dê duplo-clique. Não precisa instalar nada.
            3. Se o Windows mostrar um aviso de "Editor desconhecido"
               (SmartScreen), clique em **Mais informações → Executar assim mesmo**.
               O app é open-source e sem assinatura digital.

            Clique direito na janela para escolher a webcam, espelhar, mudar o
            formato e ajustar o enquadramento.
